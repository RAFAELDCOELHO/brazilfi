name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install deps
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check src tests
      - name: Type check
        run: uv run mypy src
      - name: Test
        run: uv run pytest
